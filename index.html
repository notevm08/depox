<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ТРИКОЛОР — Update Showcase</h1>
    <p>Упрощённая конвертация React/Vite проекта в обычные HTML/CSS/JS файлы.</p>

    <section class="card">
      <h2>Запуск проверки</h2>
      <button id="launchBtn">Запустить</button>
      <pre id="log"></pre>
    </section>

    <section class="card">
      <h2>Голосование</h2>
      <button id="upvote">👍 За</button>
      <button id="downvote">👎 Против</button>
      <p id="voteResult">Голосов пока нет</p>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
